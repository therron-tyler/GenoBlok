# GenoBlocks recipe: single-cell group comparison
# ------------------------------------------------
# Build a merged object from hashed replicates, pick a normalization, sanity-check
# the embedding, subcluster a lineage, then generate the full figure + deck set.

name: singlecell_group_comparison
track: singlecell
description: >
  End-to-end single-cell CITE-seq comparison between two conditions
  (e.g. Hi_Cog vs Lo_Cog), from raw hashed objects to a finished PowerPoint.

inputs:
  hashed_objects: list of per-pool Seurat RDS files with HTO assays
  groupfile:      examples/groupfile_template.csv   # sample -> condition / pool / phenotype
  # OR start mid-pipeline from an existing merged/subset RDS object.

steps:
  - block: singlecell/01_build_object/merge_hashed_replicates.R
    why: merge hashed replicates, add mito/ribo metrics, demux to one merged object
    produces: Merged_<...>.rds

  - block: singlecell/02_normalization_variants/compare_normalization_variants.R
    why: run merged / SCTv2 / RPCA / Harmony on the same dims+res and compare
    run: Rscript ... --input_rds Merged.rds --pca_dims "1:9,11:12;1:12" --variant all
    alt: 02_normalization_variants/sctransform_v2_pipeline.R  # SCTv2-only path

  - block: singlecell/03_pca_investigation/pca_driver_investigation.R
    why: which genes drive each PC pre/post-SCT; sweep dims x resolution; per-sample PC violins
    run: Rscript ... --input_rds Subset.rds --n_pcs 30 --stages all
    alt: 03_pca_investigation/single_sample_embedding_deepdive.R  # single-sample/batch deep-dive + pseudobulk

  - block: singlecell/04_subclustering/subcluster_group_comparison.R
    why: subcluster a lineage, group comparison via propeller + MASC + pseudobulk DESeq2
    run: Rscript ... --input_rds Subset.rds --out_dir subcluster_out/
    siblings:
      - subcluster_survey.R          # dims x res survey QC PDFs
      - dims_resolution_scan.R  # dim/res scan across an RDS list
      - adt_umap_survey.R          # ADT/RNA UMAP survey pages

  - block: singlecell/05_figures_report/singlecell_figure_engine.R
    why: one-shot figure engine — QC, UMAP, ADT, composition, volcano, DE heatmaps, GSEA, UpSet, pptx
    produces: Figures/*.png, Tables/*.csv, figures_auto_filled.pptx

  - block: report/decks/build_pca_sct_deck.py
    why: assemble a PowerPoint from a figure folder with captions in pipeline order
    siblings:
      - make_deck.py   # generic deck builder from labeled figure subfolders
